<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carpool Live Board — Sousse</title>
  <meta name="description" content="Live carpool dashboard for Sousse Facebook group — real-time ride offers and demands." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    /* ── View toggle ─────────────────────────────────────────────────────── */
    .view-toggle {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 4px;
    }
    .view-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .view-btn:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.08); }
    .view-btn.active {
      background: rgba(255,255,255,0.14);
      color: #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.25);
    }
    .view-btn svg { width: 16px; height: 16px; }

    /* ── Table view ──────────────────────────────────────────────────────── */
    .posts-table-wrapper {
      width: 100%;
      overflow-x: auto;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
    }
    .posts-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
    }
    .posts-table thead {
      background: rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .posts-table th {
      padding: 13px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }
    .posts-table td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      vertical-align: middle;
      color: rgba(255,255,255,0.85);
    }
    .posts-table tbody tr {
      transition: background 0.15s;
    }
    .posts-table tbody tr:hover { background: rgba(255,255,255,0.04); }
    .posts-table tbody tr:last-child td { border-bottom: none; }
    .tbl-user {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }
    .tbl-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .tbl-text {
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: rgba(255,255,255,0.7);
    }
    .tbl-link {
      color: rgba(139,92,246,0.9);
      text-decoration: none;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .tbl-link:hover { color: #a78bfa; text-decoration: underline; }
    .tbl-date { white-space: nowrap; color: rgba(255,255,255,0.5); font-size: 0.8rem; }
    .sortable { cursor: pointer; user-select: none; }
    .sortable:hover { color: rgba(255,255,255,0.85); }
    .sort-arrow { font-size: 0.65rem; opacity: 0.5; }
    .sort-arrow.asc::after { content: ' ▲'; }
    .sort-arrow.desc::after { content: ' ▼'; }

    /* ── Job Logs ──────────────────────────────────────────────────────── */
    .jobs-section { margin-top: 32px; }
    .jobs-section h2 {
      font-size: 1.1rem; font-weight: 600; color: rgba(255,255,255,0.8);
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .jobs-toggle {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6); padding: 4px 12px; border-radius: 6px;
      font-size: 0.75rem; cursor: pointer; font-family: inherit;
    }
    .jobs-toggle:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .job-status {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
    }
    .job-status.success { background: rgba(16,185,129,0.2); color: #34d399; }
    .job-status.running { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .job-status.error   { background: rgba(239,68,68,0.2); color: #f87171; }
    .job-status.empty   { background: rgba(251,191,36,0.2); color: #fbbf24; }

    /* ── Post Detail Modal ─────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: #1a1a2e; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; width: 90%; max-width: 640px; max-height: 80vh;
      overflow-y: auto; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 14px;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 600; color: #fff; margin: 0; }
    .modal-close {
      background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.6);
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .modal-field { margin-bottom: 12px; }
    .modal-field .mf-label {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: rgba(139,92,246,0.8); margin-bottom: 3px;
    }
    .modal-field .mf-value {
      font-size: 0.85rem; color: rgba(255,255,255,0.85);
      word-break: break-word; line-height: 1.5;
    }
    .modal-field .mf-value.mono {
      font-family: 'SF Mono', monospace; font-size: 0.75rem;
      background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px;
      color: rgba(255,255,255,0.7); white-space: pre-wrap; max-height: 200px; overflow-y: auto;
    }
    .btn-eye {
      background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.4);
      padding: 4px; border-radius: 4px; transition: color 0.15s;
    }
    .btn-eye:hover { color: rgba(139,92,246,0.9); }
    .btn-eye svg { width: 18px; height: 18px; vertical-align: middle; }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">
    <!-- Header -->
    <header>
      <div>
        <h1>🚗 Carpool Live Board</h1>
        <p class="subtitle">Sousse · Real-time rides from Facebook <span id="live-indicator" class="live-badge">Connecting...</span></p>
      </div>
      <div class="header-actions">
        <!-- View toggle -->
        <div class="view-toggle" role="group" aria-label="View mode">
          <button id="btn-cards" class="view-btn active" onclick="setView('cards')" title="Card view">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            Cards
          </button>
          <button id="btn-table" class="view-btn" onclick="setView('table')" title="Table view">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M3 12h18M3 18h18"/><path d="M8 3v18M16 3v18"/>
            </svg>
            Table
          </button>
        </div>
        <button class="btn-ghost" onclick="loadPosts();refreshStats();showToast('Refreshed')" title="Refresh data">
          ⟳ Refresh
        </button>
        <button id="sync-btn" class="btn-primary" onclick="triggerScrape()">
          <span id="sync-icon">⟳</span> Scrape Now
        </button>
        <button id="clear-btn" class="btn-ghost" onclick="clearPosts()" style="color:#f87171;border-color:rgba(248,113,113,0.3)">
          🗑 Clear Posts
        </button>
      </div>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-value" id="stat-total">—</span>
        <span class="stat-label">Total Posts</span>
      </div>
      <div class="stat-card">
        <span class="stat-value offers" id="stat-offers">—</span>
        <span class="stat-label">Offers</span>
      </div>
      <div class="stat-card">
        <span class="stat-value demands" id="stat-demands">—</span>
        <span class="stat-label">Demands</span>
      </div>
      <div class="stat-card">
        <span class="stat-value sync" id="stat-sync">—</span>
        <span class="stat-label">Last Scrape</span>
      </div>
    </div>

    <!-- Scraper Status Banner -->
    <div class="scraper-banner" id="scraper-banner">
      <div class="scraper-spinner" id="scraper-spinner"></div>
      <div>
        <div class="banner-text" id="banner-text">Scraper is running...</div>
        <div class="banner-detail" id="banner-detail"></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters glass-panel">
      <div class="filter-group">
        <label for="search-input">🔍 Search</label>
        <input id="search-input" type="text" placeholder="City, name, keywords..." oninput="debounceSearch()" />
      </div>
      <div class="filter-group">
        <label for="type-filter">Filter</label>
        <select id="type-filter" onchange="loadPosts()">
          <option value="ALL">All Posts</option>
          <option value="OFFER">Offers Only</option>
          <option value="DEMAND">Demands Only</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="city-filter">From</label>
        <input id="city-filter" type="text" placeholder="e.g. Sousse" oninput="debounceSearch()" />
      </div>
      <div class="filter-group">
        <label for="to-city-filter">To</label>
        <input id="to-city-filter" type="text" placeholder="e.g. Tunis" oninput="applyClientFilters()" />
      </div>
      <div class="filter-group">
        <label for="sort-select">Sort</label>
        <select id="sort-select" onchange="applyClientFilters()">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="price_asc">Price ↑</option>
          <option value="price_desc">Price ↓</option>
          <option value="name_az">Name A–Z</option>
        </select>
      </div>
      <div class="filter-count">
        <span id="count-label">Showing — posts</span>
      </div>
    </div>

    <!-- Content area (cards or table) -->
    <div id="posts-grid" class="posts-grid">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading posts...</p>
      </div>
    </div>
  </div>

    <!-- Job Logs -->
    <div class="jobs-section">
      <h2>📋 Scrape Jobs <button class="jobs-toggle" onclick="toggleJobs()">Show/Hide</button></h2>
      <div id="jobs-container" style="display:none">
        <div class="posts-table-wrapper">
          <table class="posts-table" id="jobs-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Started</th>
                <th>Status</th>
                <th>Duration</th>
                <th>Captured</th>
                <th>Saved</th>
                <th>Skipped (age)</th>
                <th>Error</th>
              </tr>
            </thead>
            <tbody id="jobs-tbody">
              <tr><td colspan="8" style="text-align:center;color:rgba(255,255,255,0.3)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Post Detail Modal -->
  <div class="modal-overlay" id="post-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">Post Details</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Sync Toast -->
  <div id="toast" class="toast"></div>

  <script>
    // ─── State ────────────────────────────────────────────────────────────
    let currentView = localStorage.getItem('viewMode') || 'cards';
    let currentPosts = [];
    let searchTimer;

    // ─── View mode ────────────────────────────────────────────────────────
    function setView(mode) {
      currentView = mode;
      localStorage.setItem('viewMode', mode);
      document.getElementById('btn-cards').classList.toggle('active', mode === 'cards');
      document.getElementById('btn-table').classList.toggle('active', mode === 'table');
      renderPosts(currentPosts);
    }

    // Apply saved view on load
    document.getElementById('btn-cards').classList.toggle('active', currentView === 'cards');
    document.getElementById('btn-table').classList.toggle('active', currentView === 'table');

    // ─── Search / filter ──────────────────────────────────────────────────
    function debounceSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadPosts, 300);
    }

    // ─── Load posts ───────────────────────────────────────────────────────
    async function loadPosts() {
      const search = document.getElementById('search-input').value.trim();
      const filterType = document.getElementById('type-filter').value;
      const fromCity = document.getElementById('city-filter').value.trim();

      const params = new URLSearchParams({ filter_type: filterType });
      if (search) params.append('search', search);
      if (fromCity) params.append('from_city', fromCity);

      const grid = document.getElementById('posts-grid');
      grid.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Loading...</p></div>`;

      try {
        const res = await fetch(`/api/posts?${params}`);
        currentPosts = await res.json();
        applyClientFilters();
      } catch (e) {
        grid.innerHTML = `<div class="error-state">❌ Failed to load posts.</div>`;
      }
    }

    // ─── Render dispatcher ────────────────────────────────────────────────
    function applyClientFilters() {
   const toCity = (document.getElementById('to-city-filter').value || '').trim().toLowerCase();
   const sort = document.getElementById('sort-select').value;

   let posts = [...currentPosts];

   // Client-side To City filter
   if (toCity) {
    posts = posts.filter(p =>
     (p.to_city || '').toLowerCase().includes(toCity) ||
     (p.post_text || '').toLowerCase().includes(toCity)
    );
   }

   // Sort
   posts.sort((a, b) => {
    if (sort === 'oldest') {
     return (a.post_date || '') > (b.post_date || '') ? 1 : -1;
    }
    if (sort === 'price_asc') {
     return (parseFloat(a.price) || 0) - (parseFloat(b.price) || 0);
    }
    if (sort === 'price_desc') {
     return (parseFloat(b.price) || 0) - (parseFloat(a.price) || 0);
    }
    if (sort === 'name_az') {
     return (a.profile_name || '').localeCompare(b.profile_name || '');
    }
    // newest (default): already sorted by API, keep order
    return 0;
   });

   window._displayedPosts = posts;
   renderPosts(posts);
  }

  function renderPosts(posts) {
      document.getElementById('count-label').textContent =
        `Showing ${posts.length} post${posts.length !== 1 ? 's' : ''}`;

      if (!posts.length) {
        document.getElementById('posts-grid').innerHTML = `
          <div class="empty-state glass-panel">
            <div class="empty-icon">🔍</div>
            <h3>No rides found</h3>
            <p>Try different search terms or sync the latest data.</p>
          </div>`;
        return;
      }

      if (currentView === 'table') {
        renderTable(posts);
      } else {
        renderCards(posts);
      }
    }

    // ─── Cards view ───────────────────────────────────────────────────────
    function renderCards(posts) {
      const grid = document.getElementById('posts-grid');
      grid.className = 'posts-grid';
      grid.innerHTML = posts.map((post, idx) => createPostHTML(post, idx)).join('');
    }

    function createPostHTML(post, idx) {
      const isOffer = (post.offer_or_demand || '').toLowerCase().includes('offer');
      const isDemand = (post.offer_or_demand || '').toLowerCase().includes('demand');
      const initials = (post.profile_name || '?').substring(0, 2).toUpperCase();
      const route = (post.from_city && post.to_city)
        ? `${post.from_city} → ${post.to_city}`
        : (post.from_city || post.to_city || '');
      const price = post.price ? `💰 ${post.price}` : '';
      const passengers = post.nr_passengers ? `👥 ${post.nr_passengers}` : '';
      const depTime = post.preferred_departure_time ? `🕐 ${post.preferred_departure_time}` : '';

      return `
        <div class="post-card glass-panel new-post-animate">
          <div class="post-header">
            <div class="post-user">
              <div class="avatar" style="background: ${avatarColor(post.profile_name)}">${initials}</div>
              <div>
                <div class="user-name">${escapeHtml(post.profile_name || 'Unknown')}</div>
                <div class="post-meta">${post.post_date || ''} ${post.post_time || ''}</div>
              </div>
            </div>
            <div class="tags">
              ${isOffer ? '<span class="tag tag-offer">Offer</span>' : ''}
              ${isDemand ? '<span class="tag tag-demand">Demand</span>' : ''}
              ${post.gender ? `<span class="tag tag-gender">${escapeHtml(post.gender)}</span>` : ''}
            </div>
          </div>

          ${route ? `<div class="route-bar">📍 ${escapeHtml(route)}</div>` : ''}

          <div class="post-body">${escapeHtml(post.post_text || '[No text]')}</div>

          ${post.post_text_english ? `
            <details class="translation">
              <summary>🌍 English translation</summary>
              <p>${escapeHtml(post.post_text_english)}</p>
            </details>
          ` : ''}

          <div class="post-footer">
            <div class="meta-chips">
              ${price ? `<span class="chip">${price}</span>` : ''}
              ${passengers ? `<span class="chip">${passengers}</span>` : ''}
              ${depTime ? `<span class="chip">${depTime}</span>` : ''}
            </div>
            <a href="${post.post_url}" target="_blank" rel="noopener" class="btn-ghost">View ↗</a>
            <button class="btn-eye" onclick="showPostDetail(${idx})" title="View details">${eyeIcon}</button>
          </div>
        </div>
      `;
    }

    // ─── Table view ───────────────────────────────────────────────────────
    function renderTable(posts) {
      const grid = document.getElementById('posts-grid');
      grid.className = '';   // remove posts-grid class to avoid grid CSS
      grid.innerHTML = `
        <div class="posts-table-wrapper">
          <table class="posts-table" id="data-table">
            <thead>
              <tr>
                <th class="sortable" onclick="sortTable('name')">User <span class="sort-arrow" id="sort-name"></span></th>
                <th class="sortable" onclick="sortTable('date')">Date & Time <span class="sort-arrow" id="sort-date"></span></th>
                <th>Type</th>
                <th class="sortable" onclick="sortTable('route')">Route <span class="sort-arrow" id="sort-route"></span></th>
                <th>Post Text</th>
                <th class="sortable" onclick="sortTable('price')">Price <span class="sort-arrow" id="sort-price"></span></th>
                <th>Link</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${posts.map((post, idx) => createTableRow(post, idx)).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function createTableRow(post, idx) {
      const isOffer = (post.offer_or_demand || '').toLowerCase().includes('offer');
      const isDemand = (post.offer_or_demand || '').toLowerCase().includes('demand');
      const initials = (post.profile_name || '?').substring(0, 2).toUpperCase();
      const route = (post.from_city && post.to_city)
        ? `${post.from_city} → ${post.to_city}`
        : (post.from_city || post.to_city || '—');

      return `
        <tr>
          <td>
            <div class="tbl-user">
              <div class="tbl-avatar" style="background: ${avatarColor(post.profile_name)}">${initials}</div>
              ${escapeHtml(post.profile_name || 'Unknown')}
            </div>
          </td>
          <td class="tbl-date">${post.post_date || '—'}<br><span style="color:rgba(255,255,255,0.35)">${post.post_time || ''}</span></td>
          <td>
            ${isOffer ? '<span class="tag tag-offer">Offer</span>' : ''}
            ${isDemand ? '<span class="tag tag-demand">Demand</span>' : ''}
            ${!isOffer && !isDemand ? '<span style="color:rgba(255,255,255,0.3)">—</span>' : ''}
          </td>
          <td style="white-space:nowrap">${escapeHtml(route)}</td>
          <td><div class="tbl-text" title="${escapeHtml(post.post_text || '')}">${escapeHtml(post.post_text || '[No text]')}</div></td>
          <td style="white-space:nowrap">${post.price ? `💰 ${escapeHtml(post.price)}` : '—'}</td>
          <td><a href="${post.post_url}" target="_blank" rel="noopener" class="tbl-link">View ↗</a></td>
          <td><button class="btn-eye" onclick="showPostDetail(currentPosts.indexOf(currentPosts.find(p=>p.post_url==='${post.post_url.replace(/'/g, "\'")}')))" title="Details">${eyeIcon}</button></td>
        </tr>
      `;
    }

    // ─── Helpers ──────────────────────────────────────────────────────────
    function avatarColor(name) {
      const colors = [
        'linear-gradient(135deg,#3b82f6,#8b5cf6)',
        'linear-gradient(135deg,#ec4899,#f59e0b)',
        'linear-gradient(135deg,#10b981,#3b82f6)',
        'linear-gradient(135deg,#f59e0b,#ef4444)',
        'linear-gradient(135deg,#8b5cf6,#ec4899)',
        'linear-gradient(135deg,#06b6d4,#10b981)',
      ];
      if (!name) return colors[0];
      return colors[name.charCodeAt(0) % colors.length];
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ─── Scrape trigger ───────────────────────────────────────────────────
    let scrapePolling = null;

    async function triggerScrape() {
      const btn = document.getElementById('sync-btn');
      const icon = document.getElementById('sync-icon');
      const banner = document.getElementById('scraper-banner');
      const bannerText = document.getElementById('banner-text');
      const bannerDetail = document.getElementById('banner-detail');
      const spinner = document.getElementById('scraper-spinner');

      btn.disabled = true;
      icon.classList.add('spinning');
      banner.className = 'scraper-banner active';
      spinner.style.display = 'block';
      bannerText.textContent = 'Scraper started...';
      bannerDetail.textContent = 'This may take 2-4 minutes.';

      let initialJobId = 0;
      try {
        const jr = await fetch('/api/jobs?limit=1');
        const jobs = await jr.json();
        if (jobs.length) initialJobId = jobs[0].id;
      } catch(e) {}

      try {
        await fetch('/api/scrape', { method: 'POST' });
      } catch (e) {
        banner.className = 'scraper-banner active error';
        bannerText.textContent = 'Failed to start scraper.';
        spinner.style.display = 'none';
        btn.disabled = false;
        icon.classList.remove('spinning');
        setTimeout(() => banner.className = 'scraper-banner', 5000);
        return;
      }

      let elapsed = 0;

      scrapePolling = setInterval(async () => {
        elapsed += 3;

        // Poll real scraper progress
        try {
          const sr = await fetch('/api/scrape/status');
          const status = await sr.json();

          if (status.phase === 'idle' && elapsed > 10) {
            // Scraper finished and cleaned up progress file — check job
          } else if (status.phase === 'done') {
            clearInterval(scrapePolling); scrapePolling = null;
            spinner.style.display = 'none';
            banner.className = 'scraper-banner active done';
            bannerText.textContent = status.detail || 'Scrape complete';
            bannerDetail.textContent = 'Captured: ' + (status.captured || 0) + ' | Saved: ' + (status.saved || 0);
            btn.disabled = false; icon.classList.remove('spinning');
            refreshStats(); loadPosts();
            if (jobsVisible) loadJobs();
            setTimeout(() => banner.className = 'scraper-banner', 12000);
            return;
          } else if (status.phase !== 'idle') {
            // Show real progress
            const phaseLabels = {
              starting: 'Initializing browser...',
              navigating: 'Opening group page...',
              hydrating: 'Waiting for page to render...',
              extracting: 'Parsing page data...',
              scrolling: 'Scrolling feed...',
              saving: 'Saving to database...',
            };
            bannerText.textContent = phaseLabels[status.phase] || status.detail || status.phase;
            let detail = '';
            if (status.captured) detail += status.captured + ' posts found';
            if (status.scroll) detail += ' | Scroll ' + status.scroll + '/' + status.max_scroll;
            if (detail) detail += ' | ' + elapsed + 's';
            else detail = elapsed + 's elapsed';
            bannerDetail.textContent = detail;

            if (elapsed % 15 === 0) { refreshStats(); loadPosts(); }
            return;
          }
        } catch(e) {}

        // Fallback: check jobs for completion
        try {
          const jr = await fetch('/api/jobs?limit=1');
          const jobs = await jr.json();
          if (jobs.length && jobs[0].id > initialJobId && jobs[0].status !== 'running') {
            clearInterval(scrapePolling); scrapePolling = null;
            const job = jobs[0];
            spinner.style.display = 'none';
            if (job.status === 'success') {
              banner.className = 'scraper-banner active done';
              bannerText.textContent = 'Scrape complete: ' + job.saved + ' new posts';
              bannerDetail.textContent = job.captured + ' captured, ' + job.skipped_age + ' skipped by age | ' + job.duration_sec + 's';
            } else if (job.status === 'empty') {
              banner.className = 'scraper-banner active';
              bannerText.textContent = 'No new posts found.';
              bannerDetail.textContent = 'Duration: ' + job.duration_sec + 's';
            } else {
              banner.className = 'scraper-banner active error';
              bannerText.textContent = 'Scrape failed: ' + (job.error || 'unknown');
            }
            btn.disabled = false; icon.classList.remove('spinning');
            refreshStats(); loadPosts();
            if (jobsVisible) loadJobs();
            setTimeout(() => banner.className = 'scraper-banner', 12000);
            return;
          }
        } catch(e) {}

        bannerDetail.textContent = elapsed + 's elapsed...';

        if (elapsed > 360) {
          clearInterval(scrapePolling); scrapePolling = null;
          spinner.style.display = 'none';
          banner.className = 'scraper-banner active error';
          bannerText.textContent = 'Scraper timed out.';
          btn.disabled = false; icon.classList.remove('spinning');
          refreshStats(); loadPosts();
          setTimeout(() => banner.className = 'scraper-banner', 10000);
        }
      }, 3000);
    }


    // ─── Clear posts ──────────────────────────────────────────────────────
    async function clearPosts() {
      if (!confirm('Delete all posts from the database? This cannot be undone.')) return;
      const btn = document.getElementById('clear-btn');
      btn.disabled = true;
      try {
        const res = await fetch('/api/posts', { method: 'DELETE' });
        const data = await res.json();
        showToast('🗑 ' + data.message);
        currentPosts = [];
        loadPosts();
        refreshStats();
      } catch (e) {
        showToast('❌ Failed to clear posts.');
      } finally {
        btn.disabled = false;
      }
    }

    // ─── Stats ─────────────────────────────────────────────────────────── 
    async function refreshStats() {
      try {
        const res = await fetch('/api/stats');
        const s = await res.json();
        document.getElementById('stat-total').textContent = s.total;
        document.getElementById('stat-offers').textContent = s.offers;
        document.getElementById('stat-demands').textContent = s.demands;
        document.getElementById('stat-sync').textContent = s.latest_sync || 'Never';
      } catch (e) {}
    }

    // ─── Toast ────────────────────────────────────────────────────────────
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // ─── WebSocket ────────────────────────────────────────────────────────
    function initWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/ws`;
      const socket = new WebSocket(wsUrl);
      const indicator = document.getElementById('live-indicator');

      socket.onopen = () => {
        indicator.textContent = '● Live';
        indicator.classList.add('connected');
      };

      socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'new_post') {
          handleIncomingPost(msg.data);
        }
      };

      socket.onclose = () => {
        indicator.textContent = 'Disconnected (Retrying...)';
        indicator.classList.remove('connected');
        setTimeout(initWebSocket, 5000);
      };

      socket.onerror = () => { socket.close(); };
    }

    function handleIncomingPost(post) {
      const search = document.getElementById('search-input').value.toLowerCase();
      const filterType = document.getElementById('type-filter').value;
      const fromCity = document.getElementById('city-filter').value.toLowerCase();

      if (filterType !== 'ALL' && !post.offer_or_demand?.includes(filterType)) return;
      if (search && !post.post_text?.toLowerCase().includes(search) &&
          !post.profile_name?.toLowerCase().includes(search)) return;
      if (fromCity && !post.post_text?.toLowerCase().includes(fromCity)) return;

      // Prepend to current posts list and re-render
      currentPosts = [post, ...currentPosts];

      const grid = document.getElementById('posts-grid');
      if (currentView === 'table') {
        // In table mode — prepend a row to the tbody
        const tbody = grid.querySelector('tbody');
        if (tbody) {
          const temp = document.createElement('tbody');
          temp.innerHTML = createTableRow(post);
          const newRow = temp.firstElementChild;
          newRow.style.animation = 'fadeSlideIn 0.4s ease';
          tbody.insertBefore(newRow, tbody.firstChild);
        } else {
          renderTable(currentPosts);
        }
      } else {
        // Cards mode — prepend card
        const emptyState = grid.querySelector('.empty-state');
        if (emptyState) grid.innerHTML = '';
        const temp = document.createElement('div');
        temp.innerHTML = createPostHTML(post);
        const postEl = temp.firstElementChild;
        grid.insertBefore(postEl, grid.firstChild);
      }

      // Update count
      const countLabel = document.getElementById('count-label');
      const currentCount = parseInt(countLabel.textContent.match(/\d+/)) || 0;
      countLabel.textContent = `Showing ${currentCount + 1} posts`;

      refreshStats();
    }

    // ─── Table column sorting ──────────────────────────────────────────
    let currentSort = { col: null, dir: 'asc' };

    function sortTable(col) {
      // Toggle direction
      if (currentSort.col === col) {
        currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.col = col;
        currentSort.dir = 'asc';
      }

      // Update arrows
      document.querySelectorAll('.sort-arrow').forEach(el => el.className = 'sort-arrow');
      const arrow = document.getElementById('sort-' + col);
      if (arrow) arrow.className = 'sort-arrow ' + currentSort.dir;

      // Sort displayed posts
      const posts = window._displayedPosts || [...currentPosts];
      const dir = currentSort.dir === 'asc' ? 1 : -1;

      posts.sort((a, b) => {
        let va, vb;
        switch(col) {
          case 'name':
            va = (a.profile_name || '').toLowerCase();
            vb = (b.profile_name || '').toLowerCase();
            return va < vb ? -dir : va > vb ? dir : 0;
          case 'date':
            va = (a.post_date || '') + ' ' + (a.post_time || '');
            vb = (b.post_date || '') + ' ' + (b.post_time || '');
            return va < vb ? -dir : va > vb ? dir : 0;
          case 'route':
            va = ((a.from_city || '') + (a.to_city || '')).toLowerCase();
            vb = ((b.from_city || '') + (b.to_city || '')).toLowerCase();
            return va < vb ? -dir : va > vb ? dir : 0;
          case 'price':
            va = parseFloat(a.price) || 0;
            vb = parseFloat(b.price) || 0;
            return (va - vb) * dir;
          default: return 0;
        }
      });

      window._displayedPosts = posts;
      renderPosts(posts);
    }

    // ─── Post Detail Modal ──────────────────────────────────────────────
    const eyeIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;

    function showPostDetail(idx) {
      const post = (window._displayedPosts || currentPosts)[idx];
      if (!post) return;
      const fields = [
        ['Profile', post.profile_name],
        ['Date', `${post.post_date || ''} ${post.post_time || ''}`],
        ['Post Text', post.post_text],
        ['English', post.post_text_english],
        ['French', post.post_text_french],
        ['Type', post.offer_or_demand],
        ['From', [post.from_city, post.from_area].filter(Boolean).join(', ')],
        ['To', [post.to_city, post.to_area].filter(Boolean).join(', ')],
        ['Departure', post.preferred_departure_time],
        ['Price', post.price],
        ['Passengers', post.nr_passengers],
        ['Gender', post.gender],
        ['URL', post.post_url],
        ['Week', `W${post.calendar_week || '?'} — ${post.weekday || ''}`],
        ['Scraped', post.scrape_timestamp],
      ];
      let meta = null;
      try { if (post.metadata) meta = JSON.parse(post.metadata); } catch(e) {}

      let html = fields.map(([label, val]) => {
        if (!val) return '';
        const isUrl = label === 'URL';
        return `<div class="modal-field">
          <div class="mf-label">${label}</div>
          <div class="mf-value">${isUrl ? `<a href="${escapeHtml(val)}" target="_blank" style="color:#a78bfa">${escapeHtml(val)}</a>` : escapeHtml(val)}</div>
        </div>`;
      }).join('');

      if (meta) {
        html += `<div class="modal-field">
          <div class="mf-label">Raw Metadata</div>
          <div class="mf-value mono">${escapeHtml(JSON.stringify(meta, null, 2))}</div>
        </div>`;
      }

      document.getElementById('modal-title').textContent = post.profile_name || 'Post Details';
      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('post-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('post-modal').classList.remove('open');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ─── Job Logs ──────────────────────────────────────────────────────────
    let jobsVisible = false;
    function toggleJobs() {
      jobsVisible = !jobsVisible;
      document.getElementById('jobs-container').style.display = jobsVisible ? 'block' : 'none';
      if (jobsVisible) loadJobs();
    }

    async function loadJobs() {
      try {
        const res = await fetch('/api/jobs?limit=20');
        const jobs = await res.json();
        const tbody = document.getElementById('jobs-tbody');
        if (!jobs.length) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:rgba(255,255,255,0.3)">No jobs yet</td></tr>';
          return;
        }
        tbody.innerHTML = jobs.map(j => {
          const started = j.started_at ? new Date(j.started_at).toLocaleString() : '—';
          const dur = j.duration_sec ? j.duration_sec + 's' : '—';
          const statusCls = j.status || 'running';
          return `<tr>
            <td>${j.id}</td>
            <td class="tbl-date">${started}</td>
            <td><span class="job-status ${statusCls}">${j.status || 'running'}</span></td>
            <td>${dur}</td>
            <td>${j.captured ?? '—'}</td>
            <td>${j.saved ?? '—'}</td>
            <td>${j.skipped_age ?? '—'}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,0.4)">${escapeHtml(j.error || '—')}</td>
          </tr>`;
        }).join('');
      } catch(e) {
        document.getElementById('jobs-tbody').innerHTML = '<tr><td colspan="8" style="color:#f87171">Failed to load jobs</td></tr>';
      }
    }

    // ─── Init ─────────────────────────────────────────────────────────────
    refreshStats();
    loadPosts();
    initWebSocket();
  </script>
</body>
</html>
